name: Scraping prezzi competitor

on:
  schedule:
    # Lun/Mer/Ven/Sab alle 01:00 UTC (= 03:00 CEST). Ven+Sab ravvicinati per
    # cogliere le notti del weekend fresche (col same-day, sabato è a lead 0).
    # L'ora effettiva varia per il jitter sotto + ritardo naturale di GitHub.
    - cron: '0 1 * * 1,3,5,6'
  workflow_dispatch:

# evita run paralleli se una settimana parte in ritardo
concurrency:
  group: scraping
  cancel-in-progress: false

# GITHUB_TOKEN ha bisogno di write per fare il push del calendario
permissions:
  contents: write

jobs:
  scraping:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installa dipendenze Python
        run: pip install -r requirements.txt

      - name: Installa Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Configura git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # jitter: ritarda 0-60 min così non parte mai allo stesso minuto
      # (riduce la periodicità; salta sui run manuali workflow_dispatch)
      - name: Ritardo casuale anti-pattern
        if: github.event_name == 'schedule'
        run: sleep $((RANDOM % 3600))

      # in cloud lo scheduler è la cron di GitHub: run.py salta le guardie
      # da laptop di run_scheduled.py (notify-send, fascia oraria, lock).
      # MAX_WORKERS=4 (runner = 4 vCPU): a 2 worker il run sfora le 6h e viene
      # killato (run 28445053459 cancellato a 5h); a 4 sta sotto il tetto.
      - name: Scraping e push calendario
        env:
          MAX_WORKERS: 4
        run: python run.py

      # rete di sicurezza: carica il calendario SEMPRE, anche se run.py esce
      # rosso per push fallita. Il runner è usa e getta → senza questo i dati
      # scrapati sparirebbero col runner (è successo col run 28480007969).
      - name: Salva calendario come artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calendario
          path: output/calendar_merged.json
          retention-days: 14
          if-no-files-found: warn
