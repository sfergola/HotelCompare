name: Scraping settimanale prezzi

on:
  schedule:
    - cron: '0 7 * * 2'   # martedì 07:00 UTC (09:00 CEST)
    - cron: '0 8 * * 3'   # mercoledì 08:00 UTC (10:00 CEST) — fallback
  workflow_dispatch:       # avvio manuale dalla UI GitHub

permissions:
  contents: write

jobs:
  scrapa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Controlla se già fatto questa settimana
        id: check
        run: |
          python - <<'EOF'
          import sys
          from datetime import date, timedelta
          from pathlib import Path

          output = Path("output")
          inizio = date.today() - timedelta(days=date.today().weekday())

          for f in output.glob("calendar_from*_computed*.json"):
              try:
                  s = f.stem.split("_computed")[-1]
                  d = date(int(s[:4]), int(s[4:6]), int(s[6:8]))
                  if d >= inizio:
                      print(f"Già fatto questa settimana ({d}). Skip.")
                      sys.exit(0)
              except (ValueError, IndexError):
                  continue

          print("Nessun run questa settimana. Procedo.")
          open(".do_run", "w").close()
          EOF

      - name: Installa dipendenze Python
        if: ${{ hashFiles('.do_run') != '' }}
        run: pip install -r requirements.txt

      - name: Installa Chromium
        if: ${{ hashFiles('.do_run') != '' }}
        run: playwright install chromium --with-deps

      - name: Aggiorna date nel config
        if: ${{ hashFiles('.do_run') != '' }}
        run: |
          python - <<'EOF'
          import json
          from datetime import date, timedelta
          from pathlib import Path

          cfg_path = Path("competitors.json")
          cfg = json.loads(cfg_path.read_text())
          cfg["data_inizio"] = str(date.today() + timedelta(days=1))
          cfg["data_fine"] = "2026-09-21"
          cfg_path.write_text(json.dumps(cfg, ensure_ascii=False, indent=2))
          print(f"Periodo: {cfg['data_inizio']} → {cfg['data_fine']}")
          EOF

      - name: Scrapa prezzi
        if: ${{ hashFiles('.do_run') != '' }}
        run: python run.py

      - name: Committa e pusha JSON
        if: ${{ hashFiles('.do_run') != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/calendar_*.json
          git diff --cached --quiet && echo "Nessun dato nuovo." || (
            git commit -m "chore: aggiornamento prezzi $(date +%d/%m/%Y)" &&
            git push
          )
